<div class="bootstrap-wrapper">
  <div class="container">
    <div class="row" style="margin-top: 20px;">
      <div class="col-md-12">
        <mat-card class="my-card" style="background-color: #FFFF99;">
          <div class="container text-center">
            <img src="assets/logos/logo 19.png" style="width: 150px;" />
          </div>
          <h1 class="text-center">Admin Dashboard</h1>
          <h2 class="text-center">Welcome, {{ user?.firstName }} {{ user?.lastName }}!</h2>
          
          <div class="container" style="margin-top: 30px;">
            <div class="row">
              <div class="col-md-6">
                <mat-card style="background-color: #f0f0f0; margin: 10px;">
                  <h3>User Information</h3>
                  <p><strong>Username:</strong> {{ user?.username }}</p>
                  <p><strong>Email:</strong> {{ user?.email }}</p>
                  <p><strong>Role:</strong> {{ user?.roles?.join(', ') }}</p>
                </mat-card>
              </div>
              <div class="col-md-6">
                <mat-card style="background-color: #f0f0f0; margin: 10px;">
                  <h3>Admin Actions</h3>
                  <p>Manage Users</p>
                  <p>Manage Roles</p>
                  <p>View Reports</p>
                  <p>System Settings</p>
                </mat-card>
              </div>
            </div>
          </div>

          <div class="container text-center" style="margin-top: 30px;">
            <button mat-raised-button color="warn" (click)="logout()">Logout</button>
          </div>
        </mat-card>
      </div>
    </div>
  </div>
</div>
