<div class="bootstrap-wrapper">
  <div class="container">
    <div class="row" style="margin-top: 20px;">
      <div class="col-md-3"></div>
      <div class="col-md-6">
        <mat-card class="my-card" style="background-color: #FFFF99; margin-bottom: 20px;">
          <div class="container text-center">
            <img src="assets/logos/logo 19.png" />
          </div>
          <h1 class="text-center">Forgot Password</h1>
          <h2 class="text-center">Enter your details to reset password</h2>

          <form *ngIf="!showResetForm" (ngSubmit)="formSubmit()">
            <!-- Username field -->
            <mat-form-field class="full-width" appearance="outline">
              <mat-label>User Name</mat-label>
              <input [(ngModel)]="forgotPasswordData.username" name="username" matInput placeholder="Enter Your Username" required>
              <mat-hint>Enter your registered username</mat-hint>
            </mat-form-field>
            <br /><br />

            <!-- Email field (optional) -->
            <mat-form-field class="full-width" appearance="outline">
              <mat-label>Email</mat-label>
              <input [(ngModel)]="forgotPasswordData.email" name="email" matInput type="email" placeholder="Enter Your Email" required>
              <mat-hint>Enter the registered email</mat-hint>
            </mat-form-field>

            <div class="container text-center" style="margin-top: 10px;">
              <button type="submit" mat-raised-button color="primary">Request Reset</button>
              <button class="ml20" type="button" mat-raised-button color="accent" (click)="goToLogin()">Back to Login</button>
            </div>
          </form>

          <div *ngIf="showResetForm && resetToken" class="container text-center" style="margin-top: 20px;">
            <p><strong>Reset Token Generated!</strong></p>
            <p>Please copy the token and navigate to Reset Password page.</p>
            <p style="word-break: break-all; background-color: #f0f0f0; padding: 10px; border-radius: 5px;">
              <strong>Token:</strong> {{ resetToken }}
            </p>
            <button mat-raised-button color="primary" (click)="router.navigate(['/reset-password'], {queryParams: {token: resetToken}})">
              Go to Reset Password
            </button>
          </div>
        </mat-card>
      </div>
      <div class="col-md-3"></div>
    </div>
  </div>
</div>
