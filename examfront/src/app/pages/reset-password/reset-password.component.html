<div class="bootstrap-wrapper">
  <div class="container">
    <div class="row" style="margin-top: 20px;">
      <div class="col-md-3"></div>
      <div class="col-md-6">
        <mat-card class="my-card" style="background-color: #FFFF99; margin-bottom: 20px;">
          <div class="container text-center">
            <img src="assets/logos/logo 19.png" />
          </div>
          <h1 class="text-center">Reset Password</h1>
          <h2 class="text-center">Enter your new password</h2>

          <form (ngSubmit)="formSubmit()">
            <!-- Username field -->
            <mat-form-field class="full-width" appearance="outline">
              <mat-label>User Name</mat-label>
              <input [(ngModel)]="resetPasswordData.username" name="username" matInput placeholder="Enter Your Username" required>
              <mat-hint>Enter your registered username</mat-hint>
            </mat-form-field>
            <br /><br />

            <!-- Reset Token field -->
            <mat-form-field class="full-width" appearance="outline">
              <mat-label>Reset Token</mat-label>
              <input [(ngModel)]="resetPasswordData.resetToken" name="resetToken" matInput placeholder="Enter Reset Token" required>
              <mat-hint>Paste the reset token you received</mat-hint>
            </mat-form-field>
            <br /><br />

            <!-- New Password field -->
            <mat-form-field class="full-width" appearance="outline">
              <mat-label>New Password</mat-label>
              <input [(ngModel)]="resetPasswordData.newPassword" name="newPassword" matInput [type]="hide ? 'password' : 'text'" required>
              <button mat-icon-button matSuffix type="button" (click)="hide = !hide" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide">
                <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
              </button>
              <mat-hint>At least 8 chars with uppercase, lowercase, number, and special char</mat-hint>
            </mat-form-field>
            <br /><br />

            <!-- Confirm Password field -->
            <mat-form-field class="full-width" appearance="outline">
              <mat-label>Confirm Password</mat-label>
              <input [(ngModel)]="resetPasswordData.confirmPassword" name="confirmPassword" matInput [type]="hideConfirm ? 'password' : 'text'" required>
              <button mat-icon-button matSuffix type="button" (click)="hideConfirm = !hideConfirm" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hideConfirm">
                <mat-icon>{{hideConfirm ? 'visibility_off' : 'visibility'}}</mat-icon>
              </button>
              <mat-hint>Re-enter your new password</mat-hint>
            </mat-form-field>

            <div class="container text-center" style="margin-top: 20px;">
              <button type="submit" mat-raised-button color="primary">Reset Password</button>
              <button class="ml20" type="button" mat-raised-button color="accent" (click)="goToLogin()">Back to Login</button>
            </div>
          </form>
        </mat-card>
      </div>
      <div class="col-md-3"></div>
    </div>
  </div>
</div>
